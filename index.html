<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />

    <title>新港八卦謎蹤</title>

    <!-- favicon：與活動頁共用同一組圖示（同一主機，Google 以此判定整個網站的 logo） -->
    <link
      rel="icon"
      href="https://chiayihkfce.github.io/xingang-bagua-maze/favicon.svg"
      sizes="any"
    />
    <link
      rel="icon"
      href="https://chiayihkfce.github.io/xingang-bagua-maze/favicon.png"
    />
    <link
      rel="shortcut icon"
      href="https://chiayihkfce.github.io/xingang-bagua-maze/favicon.png"
    />
    <link
      rel="apple-touch-icon"
      href="https://chiayihkfce.github.io/xingang-bagua-maze/app-icon.png"
    />

    <meta
      name="description"
      content="新港八卦謎蹤｜嘉義新港實境解謎活動。穿梭時空，解開隱藏在古鎮巷弄間的八卦謎團。"
    />

    <!-- Google 站名（site name）：此頁是整個 chiayihkfce.github.io 主機的首頁，站名由此判定 -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "新港八卦謎蹤",
        "alternateName": [
          "八卦謎蹤",
          "新港文教基金會",
          "Hsinkang Foundation"
        ],
        "url": "https://chiayihkfce.github.io/"
      }
    </script>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="新港八卦謎蹤" />
    <meta property="og:title" content="新港八卦謎蹤" />
    <meta
      property="og:description"
      content="嘉義新港實境解謎活動，穿梭時空解開古鎮巷弄間的八卦謎團。"
    />
    <meta
      property="og:image"
      content="https://chiayihkfce.github.io/xingang-bagua-maze/poster.jpg"
    />
    <meta property="og:url" content="https://chiayihkfce.github.io/" />

    <!-- 自動導向活動頁；保留可讀內容讓 Google 能讀到站名資訊 -->
    <meta
      http-equiv="refresh"
      content="2; url=https://chiayihkfce.github.io/xingang-bagua-maze/"

    <style>

      }

        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1rem;
        padding: 1.5rem;
      }
      img {
        width: 96px;
        height: 96px;
      }
      h1 {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: 0.1em;
      }
      a {
        color: #111;
        background: #f1c40f;

      }
      p {

        font-size: 0.9rem;
      }

  <body>

    </div>
    <script>
      // 後備導向（若瀏覽器未執行 meta refresh）
      setTimeout(function () {
        window.location.replace(
          'https://chiayihkfce.github.io/xingang-bagua-maze/'
        );
      }, 2000);
    </script>
  </body>
